name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx wxt prepare
      - run: npm test
      - name: Build Chrome
        run: npx wxt build
      - name: Build Firefox
        run: npx wxt build --browser firefox
